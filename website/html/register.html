<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="icon" type="image/x-icon" href="/media/icon1.png">
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="page-container">

    <header class="top-section">
        <img src="/media/logo.png" class="logo-img" alt="logo image">
    </header>

    <div class="divider">
        <img src="/media/patternPink.png" alt="background pattern">
    </div>

    <div class="form-section">
        <h1>Create Account</h1>




<form id="registerForm">

    <input type="email" name="email" placeholder="Email" required>

    <input type="password" name="password" placeholder="Password" minlength="6" required>

    <input type="password" name="confirmPassword" placeholder="Confirm Password" minlength="6" required>

    <p id="msg"></p>

    <p class="forgot">
        <a href="/html/login.html">Already have an account</a>
    </p>

    <button class="btn" type="submit">Sign up</button>

</form>



        <p class="or">Or continue with</p>

        <div class="socials">
            <i class="fab fa-facebook-f"></i>
            <i class="fab fa-instagram"></i>
            <i class="fab fa-twitter"></i>
        </div>
    </div>

</div>

<footer class="footer">
    © 2026 Host Nation | All Rights Reserved
</footer>




<script src="/Js/lrscript.js"></script>

</body>
</html>
